name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_RELEASE: ${{ github.sha }}
      VITE_SENTRY_RELEASE: ${{ github.sha }}
      VITE_SENTRY_ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate Sentry configuration
        run: |
          missing=()
          for var in SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing required Sentry secrets: ${missing[*]}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --sourcemap

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install Sentry CLI
        run: npm install --global @sentry/cli@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create Sentry Release
        run: |
          if ! sentry-cli releases info "$SENTRY_RELEASE" >/dev/null 2>&1; then
            sentry-cli releases new "$SENTRY_RELEASE"
          fi

      - name: Upload Sentry Source Maps
        run: |
          sentry-cli releases files "$SENTRY_RELEASE" upload-sourcemaps .vercel/output/static/assets \
            --url-prefix "~/assets" \
            --rewrite \
            --validate

      - name: Finalize Sentry Release
        run: sentry-cli releases finalize "$SENTRY_RELEASE"

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
