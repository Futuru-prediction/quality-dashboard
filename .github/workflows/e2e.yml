name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (local preview)
        run: npx playwright test
        working-directory: e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ""

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/report/html/
          retention-days: 7

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/report/results.json
          retention-days: 7

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7
